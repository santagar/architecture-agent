name: Bug report
description: Report a defect in CLI behavior, workflow execution guidance, or generated outputs.
title: "[Bug] "
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npm view @santagar/architecture-agent version` or installed version.
      placeholder: 0.1.3
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command executed
      description: Full command and flags.
      placeholder: npx architecture-agent launch workflow 01 --mode update --git-scope origin/main~1..origin/main
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Repository/context details
      description: Stack type, repo kind (service/library/iac), and relevant constraints.
